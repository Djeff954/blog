<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finanças & Investimentos | Blog</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-gray-100 text-gray-900">

  <!-- NAVBAR -->
  <header class="bg-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-blue-700">Finanças & Investimentos</h1>

      <nav class="space-x-6 text-lg font-medium">
        <a href="/" class="hover:text-blue-600">Início</a>
        <a href="/sobre" class="hover:text-blue-600">Sobre</a>
        <a href="/contacto" class="hover:text-blue-600">Contacto</a>
        <a href="/politica-de-privacidade" class="hover:text-blue-600">Privacidade</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="bg-blue-700 text-white py-20">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <h2 class="text-4xl font-bold mb-4">Domine as suas Finanças</h2>
      <p class="text-xl opacity-90 mb-6">Aprenda a investir, poupar e construir riqueza com conteúdos simples e práticos.</p>
      <a href="#conteudos" class="bg-white text-blue-700 px-6 py-3 rounded-lg font-semibold shadow hover:bg-gray-200 transition">Explorar Conteúdos</a>
    </div>
  </section>

  <!-- 🔍 PESQUISA + FILTRO (SUBSTITUÍDO AQUI) -->
  <section class="max-w-6xl mx-auto px-4 mt-10">
    <div class="flex flex-col md:flex-row items-center justify-between gap-4">

      <!-- Campo de Pesquisa -->
      <input 
        id="searchInput"
        type="text"
        placeholder="Pesquisar artigos..."
        class="w-full md:w-1/2 px-4 py-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-600"
      />

      <!-- Filtro por Categoria -->
      <select 
        id="categoryFilter"
        class="w-full md:w-1/3 px-4 py-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-600"
      >
        <option value="">Todas as categorias</option>
      </select>

    </div>
  </section>

  <!-- LISTA DINÂMICA DE POSTS -->
  <section id="conteudos" class="max-w-6xl mx-auto px-4 py-16">
    <h3 class="text-3xl font-bold mb-8 text-center">Últimos Artigos</h3>

    <div id="postsContainer" class="grid md:grid-cols-3 gap-8"></div>
  </section>

  <!-- FOOTER -->
  <footer class="bg-gray-900 text-gray-300 py-8 mt-16">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <p class="text-sm">© 2026 Finanças & Investimentos — Todos os direitos reservados.</p>
    </div>
  </footer>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://SEU-PROJETO.supabase.co";
    const supabaseKey = "SEU-ANON-KEY";
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function carregarCategorias() {
      const { data, error } = await supabase
        .from("categorias")
        .select("*")
        .order("nome", { ascending: true });

      if (error) return;

      const select = document.getElementById("categoryFilter");
      data.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat.nome;
        opt.textContent = cat.nome;
        select.appendChild(opt);
      });
    }

    async function carregarPosts(filtroTexto = "", filtroCategoria = "") {
      let query = supabase.from("posts").select("*").order("created_at", { ascending: false });

      if (filtroTexto) {
        query = query.ilike("titulo", `%${filtroTexto}%`);
      }

      if (filtroCategoria) {
        query = query.eq("categoria", filtroCategoria);
      }

      const { data, error } = await query;
      if (error) return;

      const container = document.getElementById("postsContainer");
      container.innerHTML = "";

      data.forEach(post => {
        const card = document.createElement("div");
        card.className = "bg-white shadow rounded-lg overflow-hidden hover:shadow-lg transition";

        card.innerHTML = `
          <img src="${post.capa || 'https://via.placeholder.com/600x300'}" class="w-full h-40 object-cover" />
          <div class="p-5">
            <h4 class="text-xl font-bold mb-2">${post.titulo}</h4>
            <p class="text-gray-700 mb-4">${post.descricao_curta}</p>
            <a href="/post.html?id=${post.id}" class="text-blue-600 font-semibold hover:underline">Ler mais</a>
          </div>
        `;

        container.appendChild(card);
      });
    }

    document.getElementById("searchInput").addEventListener("input", e => {
      carregarPosts(e.target.value, document.getElementById("categoryFilter").value);
    });

    document.getElementById("categoryFilter").addEventListener("change", e => {
      carregarPosts(document.getElementById("searchInput").value, e.target.value);
    });

    carregarCategorias();
    carregarPosts();
  </script>

</body>
</html>
