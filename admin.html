<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-gray-100">

  <!-- LOGIN -->
  <div id="loginSection" class="min-h-screen flex items-center justify-center">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center">Acesso ao Painel</h2>

      <input id="email" type="email" placeholder="Email"
        class="w-full mb-4 px-4 py-3 border rounded-lg">

      <input id="password" type="password" placeholder="Senha"
        class="w-full mb-4 px-4 py-3 border rounded-lg">

      <button onclick="login()"
        class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">
        Entrar
      </button>

      <p id="loginError" class="text-red-600 text-center mt-4 hidden">Credenciais inválidas</p>
    </div>
  </div>

  <!-- PAINEL ADMIN -->
  <div id="adminSection" class="hidden max-w-4xl mx-auto py-10 px-4">

    <h1 class="text-3xl font-bold mb-8 text-center">Painel de Administração</h1>

    <!-- FORMULÁRIO DE NOVO POST -->
    <div class="bg-white shadow-lg rounded-lg p-6 mb-10">
      <h2 class="text-xl font-bold mb-4">Adicionar Novo Post</h2>

      <input id="titulo" type="text" placeholder="Título"
        class="w-full mb-4 px-4 py-3 border rounded-lg">

      <input id="descricao_curta" type="text" placeholder="Descrição curta"
        class="w-full mb-4 px-4 py-3 border rounded-lg">

      <input id="categoria" type="text" placeholder="Categoria"
        class="w-full mb-4 px-4 py-3 border rounded-lg">

      <input id="capa" type="text" placeholder="Link da imagem de capa"
        class="w-full mb-4 px-4 py-3 border rounded-lg">

      <textarea id="conteudo" placeholder="Conteúdo completo"
        class="w-full mb-4 px-4 py-3 border rounded-lg h-40"></textarea>

      <button onclick="criarPost()"
        class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700">
        Publicar Post
      </button>

      <p id="postMsg" class="text-green-600 mt-4 hidden">Post publicado com sucesso</p>
    </div>

    <!-- LISTA DE POSTS -->
    <h2 class="text-2xl font-bold mb-4">Posts Existentes</h2>
    <div id="listaPosts" class="space-y-4"></div>

  </div>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://etnrtknzieulkbatgnoz.supabase.co";
    const supabaseKey = "sb_publishable_WLEOxOgv1edIDZEbZJCC4w_Q2wA3Cfm";
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // LOGIN
    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        document.getElementById("loginError").classList.remove("hidden");
        return;
      }

      document.getElementById("loginSection").classList.add("hidden");
      document.getElementById("adminSection").classList.remove("hidden");

      carregarPosts();
    }

    // CRIAR POST
    async function criarPost() {
      const titulo = document.getElementById("titulo").value;
      const descricao_curta = document.getElementById("descricao_curta").value;
      const categoria = document.getElementById("categoria").value;
      const capa = document.getElementById("capa").value;
      const conteudo = document.getElementById("conteudo").value;

      const { error } = await supabase.from("posts").insert([
        { titulo, descricao_curta, categoria, capa, conteudo }
      ]);

      if (!error) {
        document.getElementById("postMsg").classList.remove("hidden");
        carregarPosts();
      }
    }

    // LISTAR POSTS
    async function carregarPosts() {
      const { data } = await supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      const lista = document.getElementById("listaPosts");
      lista.innerHTML = "";

      data.forEach(post => {
        const div = document.createElement("div");
        div.className = "bg-white p-4 shadow rounded-lg";

        div.innerHTML = `
          <h3 class="text-xl font-bold">${post.titulo}</h3>
          <p class="text-gray-600">${post.descricao_curta}</p>
          <p class="text-sm text-blue-600">Categoria: ${post.categoria}</p>

          <div class="mt-4 flex gap-4">
            <button onclick="editarPost(${post.id})"
              class="bg-yellow-500 text-white px-4 py-2 rounded">Editar</button>

            <button onclick="apagarPost(${post.id})"
              class="bg-red-600 text-white px-4 py-2 rounded">Apagar</button>
          </div>
        `;

        lista.appendChild(div);
      });
    }

    // APAGAR POST
    async function apagarPost(id) {
      await supabase.from("posts").delete().eq("id", id);
      carregarPosts();
    }

    // EDITAR POST (abre prompt simples)
    async function editarPost(id) {
      const novoTitulo = prompt("Novo título:");
      if (!novoTitulo) return;

      await supabase.from("posts").update({ titulo: novoTitulo }).eq("id", id);
      carregarPosts();
    }
  </script>

</body>
</html>
